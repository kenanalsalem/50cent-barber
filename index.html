<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no">
  <title>صالون 50cent | للحلاقة الرجالية</title>
  
  <!-- مكتبة QR Code -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    .main-container {
      max-width: 750px;
      width: 100%;
      background: rgba(20, 20, 20, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 175, 55, 0.4);
      border-radius: 40px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.8), 0 0 40px rgba(212, 175, 55, 0.3);
      padding: 25px 20px 30px;
      position: relative;
      overflow: hidden;
    }

    .main-container::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 30%, rgba(212,175,55,0.15), transparent 60%);
      animation: goldShift 12s infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes goldShift {
      0% { transform: rotate(0deg); opacity: 0.5; }
      100% { transform: rotate(15deg); opacity: 0.9; }
    }

    .content {
      position: relative;
      z-index: 2;
    }

    .logo-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .logo-icon {
      background: #000;
      border-radius: 50%;
      padding: 8px;
      border: 2px solid #d4af37;
      box-shadow: 0 0 20px #d4af37;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 65px;
      height: 65px;
      fill: #d4af37;
    }

    .salon-name {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(to right, #d4af37, #f9e076, #d4af37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 25px rgba(212,175,55,0.6);
    }

    .sub-text {
      font-size: 1.1rem;
      color: #ccc;
      text-align: center;
      margin: 5px 0 15px;
      font-style: italic;
      border-bottom: 1px dashed #d4af37;
      padding-bottom: 10px;
    }

    .phrase {
      color: #d4af37;
      font-weight: bold;
      font-size: 1.2rem;
      text-align: center;
      margin: 5px 0 20px;
    }

    .booking-panel {
      background: rgba(0,0,0,0.6);
      border-radius: 30px;
      padding: 20px;
      border: 1px solid #d4af37;
      backdrop-filter: blur(10px);
      margin-bottom: 20px;
    }

    .input-group {
      margin: 15px 0;
      text-align: center;
    }

    .input-group label {
      display: block;
      color: #d4af37;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .input-group input {
      width: 80%;
      padding: 12px 20px;
      border-radius: 30px;
      border: 2px solid #d4af37;
      background: #1a1a1a;
      color: #fff;
      font-size: 1rem;
      text-align: center;
      outline: none;
    }

    .date-selector {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 15px 0;
    }

    .date-btn {
      background: #222;
      border: 1px solid #555;
      color: #ddd;
      padding: 12px 20px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.9rem;
    }

    .date-btn.selected {
      background: #d4af37;
      color: #000;
      border-color: #fff;
      box-shadow: 0 0 20px #d4af37;
    }

    .service-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 15px 0;
    }

    .service-btn {
      background: #222;
      border: 1px solid #555;
      color: #ddd;
      padding: 12px 16px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.95rem;
    }

    .service-btn.selected {
      background: #d4af37;
      color: #000;
      border-color: #fff;
      box-shadow: 0 0 25px #d4af37;
    }

    .hospitality-option {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      margin: 15px 0;
      background: #1e1e1e;
      padding: 12px;
      border-radius: 40px;
    }

    .hospitality-option label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: #ccc;
    }

    .time-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin: 15px 0;
    }

    .time-slot {
      background: #2a2a2a;
      border: 1px solid #444;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.2s;
    }

    .time-slot.booked {
      background: #5a2a2a;
      border-color: #a00;
      color: #aaa;
      text-decoration: line-through;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .time-slot.selected {
      background: #d4af37;
      color: #000;
      font-weight: bold;
      border-color: #fff;
    }

    .book-btn {
      background: #d4af37;
      color: #000;
      font-weight: bold;
      font-size: 1.3rem;
      padding: 15px 25px;
      border: none;
      border-radius: 50px;
      width: 100%;
      margin-top: 15px;
      cursor: pointer;
      transition: 0.3s;
      letter-spacing: 1px;
    }

    .book-btn:hover {
      background: #f9e076;
      box-shadow: 0 0 30px #d4af37;
    }

    .whatsapp-btn {
      background: #25D366;
      color: white;
      font-weight: bold;
      font-size: 1.1rem;
      padding: 14px 20px;
      border: none;
      border-radius: 50px;
      width: 100%;
      margin-top: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.3s;
      text-decoration: none;
    }

    .whatsapp-btn:hover {
      background: #1ebe57;
      box-shadow: 0 0 25px #25D366;
    }

    .qrcode-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 20px 0 5px;
      background: #111;
      padding: 15px;
      border-radius: 20px;
      border: 1px solid #d4af37;
    }

    #qrcode {
      background: white;
      padding: 15px;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 130px;
      min-height: 130px;
    }

    /* حل مشكلة تكرار الباركود */
    #qrcode img {
      display: block;
      max-width: 100%;
      height: auto;
    }
    #qrcode canvas {
      display: none;
    }

    .footer-note {
      color: #aaa;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 10px;
    }

    .popup-bubble {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1e1e1e;
      border: 3px solid #d4af37;
      border-radius: 30px;
      padding: 25px 30px;
      z-index: 999;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.9), 0 0 30px #d4af37;
      backdrop-filter: blur(10px);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      min-width: 280px;
    }

    .popup-bubble.active {
      display: flex;
    }

    .popup-message {
      color: #f9e076;
      font-size: 1.4rem;
      font-weight: bold;
      line-height: 1.5;
    }

    .popup-close {
      background: #d4af37;
      color: #000;
      border: none;
      padding: 10px 25px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
    }

    .message-inline {
      background: #222;
      border: 2px solid #d4af37;
      color: #f9e076;
      padding: 12px;
      border-radius: 20px;
      text-align: center;
      margin: 10px 0;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    audio {
      display: none;
    }
  </style>
</head>
<body>
<div class="main-container">
  <div class="content">
    <div class="logo-section">
      <div class="logo-icon">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="45" r="22" fill="#2c1a0e" stroke="#d4af37" stroke-width="3"/>
          <circle cx="38" cy="40" r="5" fill="#fff" stroke="#000" stroke-width="1.5"/>
          <circle cx="62" cy="40" r="5" fill="#fff" stroke="#000" stroke-width="1.5"/>
          <rect x="33" y="25" width="34" height="8" rx="4" fill="#111" stroke="#d4af37" stroke-width="2"/>
          <path d="M25 70 L35 55 L65 55 L75 70" fill="#2c1a0e" stroke="#d4af37" stroke-width="3"/>
          <line x1="15" y1="30" x2="85" y2="30" stroke="#d4af37" stroke-width="4"/>
          <circle cx="20" cy="28" r="5" fill="#d4af37"/>
          <circle cx="80" cy="28" r="5" fill="#d4af37"/>
          <text x="50" y="92" text-anchor="middle" fill="#d4af37" font-size="12" font-weight="bold">مقص</text>
        </svg>
      </div>
      <h1 class="salon-name">50cent</h1>
    </div>
    <div class="sub-text">"زورنا لنفهمك وتفهمنا .. أناقتك مثل ما تهمك تهمنا"</div>
    <div class="phrase">🎩 لسنا الوحيدين لكننا نسعى لإرضاء زبائننا</div>

    <div id="userMessage" class="message-inline" style="display: none;"></div>

    <div class="booking-panel">
      <!-- خانة اسم الزبون -->
      <div class="input-group">
        <label>👤 اسمك وردة</label>
        <input type="text" id="customerName" placeholder="اكتب اسمك وردة هنا..." required>
      </div>

      <div style="text-align:center; font-size:1.1rem; margin-bottom:5px; color:#d4af37;">📅 اختر اليوم</div>
      <div class="date-selector" id="dateSelector"></div>

      <div style="text-align:center; font-size:1.2rem; margin:15px 0 5px;">✂️ اختر الخدمات (يمكنك اختيار أكثر من واحدة)</div>
      <div class="service-grid" id="serviceContainer">
        <button class="service-btn" data-service="حلاقة شعر">💈 حلاقة شعر</button>
        <button class="service-btn" data-service="حلاقة ذقن">🧔 حلاقة ذقن</button>
        <button class="service-btn" data-service="حلاقة طفل">👶 حلاقة طفل</button>
        <button class="service-btn" data-service="تنظيف بشرة">✨ تنظيف بشرة</button>
      </div>

      <div class="hospitality-option">
        <span style="color:#d4af37;">☕ الضيافة:</span>
        <label>
          <input type="radio" name="drink" value="شاي" checked> شاي 🍵
        </label>
        <label>
          <input type="radio" name="drink" value="قهوة"> قهوة ☕
        </label>
      </div>

      <div style="text-align:center; margin:10px 0;">⏰ المواعيد المتاحة (10ص - 10م)</div>
      <div class="time-selector" id="timeSlots"></div>

      <button class="book-btn" id="confirmBooking">✅ تأكيد الحجز</button>
      <div id="bookingStatus" style="text-align:center; margin-top:10px; color:#d4af37;"></div>
      
      <div id="whatsappContainer" style="display: none; margin-top: 10px;">
        <a href="#" id="whatsappLink" target="_blank" class="whatsapp-btn">
          💬 إرسال الحجز عبر واتساب
        </a>
      </div>
    </div>

    <!-- باركود الموقع -->
    <div class="qrcode-box">
      <div id="qrcode"></div>
      <span style="color:#d4af37; margin-top:8px;">📱 باركود موقع صالون 50cent</span>
    </div>
    <div class="footer-note">© 2025 صالون 50cent | جميع الحقوق محفوظة</div>
  </div>
</div>

<div id="popupBubble" class="popup-bubble">
  <div class="popup-message" id="popupText"></div>
  <button class="popup-close" id="popupClose">حسناً ✋</button>
</div>

<!-- ملفات الصوت -->
<audio id="soundScissors" preload="auto">
  <source src="https://www.soundjay.com/mechanical/sounds/scissors-1.mp3" type="audio/mpeg">
</audio>
<audio id="soundSuccess" preload="auto">
  <source src="https://www.soundjay.com/human/sounds/applause-1.mp3" type="audio/mpeg">
</audio>
<audio id="soundError" preload="auto">
  <source src="https://www.soundjay.com/buttons/sounds/button-10.mp3" type="audio/mpeg">
</audio>
<!-- صوت الضحك -->
<audio id="soundLaugh" preload="auto">
  <source src="https://actions.google.com/sounds/v1/human_voices/human_laugh_crowd.ogg" type="audio/ogg">
</audio>

<script>
  (function() {
    const startHour = 10;
    const endHour = 22;
    const STORAGE_BOOKINGS = 'fiftycent_bookings_v4';
    const WHATSAPP_NUMBER = '+963980156410';

    let selectedServices = new Set();
    let selectedTime = null;
    let selectedDate = null;
    let currentBookings = {};

    const customerNameInput = document.getElementById('customerName');
    const dateSelector = document.getElementById('dateSelector');
    const serviceButtons = document.querySelectorAll('.service-btn');
    const timeSlotsContainer = document.getElementById('timeSlots');
    const confirmBtn = document.getElementById('confirmBooking');
    const userMessageDiv = document.getElementById('userMessage');
    const bookingStatusDiv = document.getElementById('bookingStatus');
    const drinkRadios = document.getElementsByName('drink');
    const whatsappContainer = document.getElementById('whatsappContainer');
    const whatsappLink = document.getElementById('whatsappLink');

    const popupBubble = document.getElementById('popupBubble');
    const popupText = document.getElementById('popupText');
    const popupClose = document.getElementById('popupClose');

    const soundScissors = document.getElementById('soundScissors');
    const soundSuccess = document.getElementById('soundSuccess');
    const soundError = document.getElementById('soundError');
    const soundLaugh = document.getElementById('soundLaugh');

    function playSound(audioElement) {
      if (audioElement) {
        audioElement.currentTime = 0;
        audioElement.play().catch(e => console.log("تفاعل الصوت يحتاج نقرة المستخدم"));
      }
    }

    function showPopup(message) {
      popupText.innerHTML = message;
      popupBubble.classList.add('active');
    }

    popupClose.addEventListener('click', function() {
      popupBubble.classList.remove('active');
      soundLaugh.pause();
      soundLaugh.currentTime = 0;
    });

    function format12Hour(time24) {
      const [hourStr, minute] = time24.split(':');
      let hour = parseInt(hourStr, 10);
      const ampm = hour >= 12 ? 'م' : 'ص';
      hour = hour % 12;
      if (hour === 0) hour = 12;
      return `${hour}:${minute} ${ampm}`;
    }

    function formatDate(dateString) {
      const parts = dateString.split('-');
      return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    function loadBookings() {
      const stored = localStorage.getItem(STORAGE_BOOKINGS);
      if (stored) {
        try { currentBookings = JSON.parse(stored); } catch(e) { currentBookings = {}; }
      } else {
        currentBookings = {};
      }
    }

    function saveBookings() {
      localStorage.setItem(STORAGE_BOOKINGS, JSON.stringify(currentBookings));
    }

    function getBookingKey(date, time) { return `${date}_${time}`; }

    function isTimeBooked(date, time) { return currentBookings[getBookingKey(date, time)] === true; }

    function showInlineMessage(text, isSmile = true) {
      userMessageDiv.style.display = 'flex';
      userMessageDiv.innerHTML = `${text} ${isSmile ? '😁😄' : '🙃'}`;
      clearTimeout(window.msgTimeout);
      window.msgTimeout = setTimeout(() => {
        userMessageDiv.style.display = 'none';
      }, 6000);
    }

    function renderDateSelector() {
      dateSelector.innerHTML = '';
      const today = new Date();
      
      for (let i = 0; i < 7; i++) {
        const date = new Date(today);
        date.setDate(today.getDate() + i);
        
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const dateString = `${year}-${month}-${day}`;
        
        const dayNames = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
        const dayName = dayNames[date.getDay()];
        
        const displayText = i === 0 ? `اليوم (${dayName})` : `${dayName} ${day}/${month}`;
        
        const dateBtn = document.createElement('div');
        dateBtn.className = 'date-btn';
        dateBtn.dataset.date = dateString;
        dateBtn.textContent = displayText;
        
        dateBtn.addEventListener('click', function() {
          document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('selected'));
          this.classList.add('selected');
          selectedDate = this.dataset.date;
          selectedTime = null;
          document.querySelectorAll('.time-slot.selected').forEach(el => el.classList.remove('selected'));
          renderTimeSlots();
          playSound(soundScissors);
        });
        
        dateSelector.appendChild(dateBtn);
      }
      
      const firstBtn = dateSelector.querySelector('.date-btn');
      if (firstBtn) {
        firstBtn.classList.add('selected');
        selectedDate = firstBtn.dataset.date;
      }
    }

    function renderTimeSlots() {
      timeSlotsContainer.innerHTML = '';
      if (!selectedDate) return;
      
      for (let h = startHour; h < endHour; h++) {
        for (let m = 0; m < 60; m += 30) {
          const hourStr = String(h).padStart(2,'0');
          const minStr = String(m).padStart(2,'0');
          const timeKey = `${hourStr}:${minStr}`;
          const booked = isTimeBooked(selectedDate, timeKey);
          const displayTime = format12Hour(timeKey);

          const slotDiv = document.createElement('div');
          slotDiv.className = `time-slot ${booked ? 'booked' : ''}`;
          slotDiv.dataset.time = timeKey;
          slotDiv.textContent = displayTime;

          if (!booked) {
            slotDiv.addEventListener('click', function(e) {
              if (this.classList.contains('booked')) return;
              document.querySelectorAll('.time-slot.selected').forEach(el => el.classList.remove('selected'));
              this.classList.add('selected');
              selectedTime = this.dataset.time;
              playSound(soundScissors);
            });
          }
          timeSlotsContainer.appendChild(slotDiv);
        }
      }
    }

    function resetSelection() {
      selectedServices.clear();
      selectedTime = null;
      serviceButtons.forEach(b => b.classList.remove('selected'));
      document.querySelectorAll('.time-slot.selected').forEach(el => el.classList.remove('selected'));
    }

    function buildWhatsappLink(customerName, servicesList, date, time, drink) {
      const displayTime = format12Hour(time);
      const displayDate = formatDate(date);
      const servicesText = servicesList.join(' + ');
      const message = `مرحباً صالون 50cent،\nالاسم: ${customerName}\nالخدمات: ${servicesText}\nالتاريخ: ${displayDate}\nالوقت: ${displayTime}\nالضيافة: ${drink}\nشكراً لكم.`;
      const encoded = encodeURIComponent(message);
      return `https://wa.me/${WHATSAPP_NUMBER}?text=${encoded}`;
    }

    serviceButtons.forEach(btn => {
      btn.addEventListener('click', function() {
        const service = this.dataset.service;
        if (this.classList.contains('selected')) {
          this.classList.remove('selected');
          selectedServices.delete(service);
        } else {
          this.classList.add('selected');
          selectedServices.add(service);
        }
        playSound(soundScissors);
      });
    });

    confirmBtn.addEventListener('click', function() {
      const customerName = customerNameInput.value.trim();
      
      // حماية الحجز المزدوج خلال 4 أيام 
      const lastBookingTimestamp = localStorage.getItem('fiftycent_last_booking_timestamp');
      const now = Date.now();
      const fourDaysInMs = 4 * 24 * 60 * 60 * 1000;

      if (lastBookingTimestamp && (now - parseInt(lastBookingTimestamp)) < fourDaysInMs) {
        showPopup("شبيك وردة كم مرة تحلق باليوم 😂<br>ياهو انتا مفكر حالك جاستن بيبر 🤣");
        playSound(soundLaugh);
        return;
      }

      if (!customerName) { showPopup("يرجى كتابة اسمك أولاً يا غالي 👤"); playSound(soundError); return; }
      if (!selectedDate) { showPopup("يرجى اختيار اليوم 📅"); playSound(soundError); return; }
      if (selectedServices.size === 0) { showPopup("الرجاء اختيار خدمة واحدة على الأقل"); playSound(soundError); return; }
      if (!selectedTime) { showPopup("الرجاء اختيار وقت للحجز"); playSound(soundError); return; }
      if (isTimeBooked(selectedDate, selectedTime)) { showPopup("هذا الوقت محجوز، اختر وقتاً آخر"); return; }

      let drinkChoice = "شاي";
      for (let radio of drinkRadios) {
        if (radio.checked) { drinkChoice = radio.value; break; }
      }

      const bookingKey = getBookingKey(selectedDate, selectedTime);
      currentBookings[bookingKey] = true;
      saveBookings();

      localStorage.setItem('fiftycent_last_booking_timestamp', now.toString());

      const servicesArray = Array.from(selectedServices);
      const servicesText = servicesArray.join(' + ');
      const displayTime = format12Hour(selectedTime);
      const displayDate = formatDate(selectedDate);
      
      bookingStatusDiv.textContent = `✅ أهلاً ${customerName} | تم حجز: ${servicesText} | ${displayDate} | ${displayTime}`;
      playSound(soundSuccess);
      showInlineMessage(`🚀 حجزك تأكد يا كابتن ${customerName}!`, true);

      const waLink = buildWhatsappLink(customerName, servicesArray, selectedDate, selectedTime, drinkChoice);
      whatsappLink.href = waLink;
      whatsappContainer.style.display = 'block';

      resetSelection();
      renderTimeSlots();
    });

    // توليد الباركود
    function generateQRCode() {
      const qrContainer = document.getElementById('qrcode');
      if (!qrContainer) return;
      qrContainer.innerHTML = '';
      const websiteUrl = "https://www.50cent-salon.com";
      
      if (typeof QRCode !== 'undefined') {
        try {
          new QRCode(qrContainer, {
            text: websiteUrl,
            width: 130,
            height: 130,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
          });
        } catch (error) {
          console.error("خطأ الباركود:", error);
        }
      }
    }

    function init() {
      loadBookings();
      renderDateSelector();
      renderTimeSlots();
      setTimeout(generateQRCode, 300);
      resetSelection();
      whatsappContainer.style.display = 'none';
    }

    window.addEventListener('load', init);
  })();
</script>
</body>
</html>
